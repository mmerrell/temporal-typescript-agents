services:

  # ── Temporal dev server ───────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - LOG_LEVEL=warn
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ── Network proxy + control panel ────────────────────────────────────────
  proxy:
    build: ./proxy
    ports:
      - "8888:8888"   # mitmproxy
      - "5000:5000"   # control panel UI
    volumes:
      - proxy-certs:/certs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── Agent demos ───────────────────────────────────────────────────────────
  agent:
    build: ./agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TEMPORAL_ADDRESS=temporal:7233
      - HTTP_PROXY=http://proxy:8888
      - HTTPS_PROXY=http://proxy:8888
      - NO_PROXY=temporal,localhost,127.0.0.1
      # Node.js does not use the system truststore — must be set explicitly
      - NODE_EXTRA_CA_CERTS=/certs/mitmproxy-ca-cert.pem
    volumes:
      - proxy-certs:/certs:ro
      - ./agent:/app
    depends_on:
      temporal:
        condition: service_healthy
      proxy:
        condition: service_healthy
    working_dir: /app
    command: ["npx", "ts-node", "worker.ts"]

volumes:
  proxy-certs:
